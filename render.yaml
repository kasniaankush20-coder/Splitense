services:
  - type: web
    name: splitense
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DATA_DIR
        value: /var/data/splitense
    disk:
      name: splitense-data
      mountPath: /var/data
      sizeGB: 1
